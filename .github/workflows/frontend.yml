name: Frontend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "feat/**"

permissions:
  contents: read

jobs:
  frontend-test:
    name: Svelte check and vitest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Vitest
        run: npm test
