[[permission]]
identifier = "main-window-commands"
description = "Allows the trusted main window to invoke every application command registered by Hive Manager."
commands.allow = [
    "create_pty",
    "write_to_pty",
    "paste_to_pty",
    "inject_to_pty",
    "resize_pty",
    "kill_pty",
    "get_pty_status",
    "list_ptys",
    "launch_hive",
    "launch_hive_v2",
    "launch_research",
    "launch_swarm",
    "launch_solo",
    "launch_fusion",
    "launch_debate",
    "get_session",
    "list_sessions",
    "stop_session",
    "close_session",
    "stop_agent",
    "update_session_metadata",
    "queen_inject",
    "queen_switch_branch",
    "operator_inject",
    "add_worker_to_session",
    "get_coordination_log",
    "log_coordination_message",
    "get_workers_state",
    "assign_task",
    "get_session_storage_path",
    "list_stored_sessions",
    "get_current_directory",
    "get_app_config",
    "update_app_config",
    "get_cli_health",
    "get_session_plan",
    "list_branches",
    "get_current_branch",
    "switch_branch",
    "git_pull",
    "git_push",
    "git_fetch",
    "git_worktree_add",
    "git_worktree_list",
    "git_worktree_remove",
    "git_worktree_prune",
    "continue_after_planning",
    "mark_plan_ready",
    "resume_session",
    "get_run_journal",
    "list_session_files",
    "open_preview_window",
    "close_preview_window",
    "dock_preview_window",
    "undock_preview_window",
    "reload_preview_window",
    "get_preview_status",
]
